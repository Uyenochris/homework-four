<!DOCTYPE html>
<html>
<head>
    <title>Travel Adventures</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="toppart">
    <div class="logoitem">
        <img src="images/logo-white.png" alt="logo">
    </div>

    <div class="linkpart">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Tours</a>
        <a href="#">Offers</a>
        <a href="#">Contact</a>
    </div>
</div>

<div class="heroitem">
    <h1>Travel-Fly</h1>
    <p>rehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proide</p>
    <button class="bluejob">Read More</button>
</div>

<div class="trippart">
    <div class="tripitem">
        <img src="images/tour-01.jpg" alt="">
        <h2>Israel</h2>
        <p>$1000</p>
        <button class="smalljob">Go</button>
    </div>
    <div class="place">
        <img src="images/tour-02.jpg" alt="">
        <h2>USA</h2>
        <p>$1500</p>
        <button class="smalljob">Go</button>
    </div>
    <div class="area">
        <img src="images/hero-image.jpg" alt="">
        <h2>Australia</h2>
        <p>$1800</p>
        <button class="smalljob">Go</button>
    </div>
</div>

<div class="formjob">
    <h3>Booking Form</h3>

    <div class="rowitem">
        <input placeholder="Name">
        <input placeholder="Email">
    </div>

    <div class="floor">
        <input placeholder="Country">
        <input placeholder="Hotel">
    </div>

    <div class="rowitem">
        <input type="date">
        <input type="date">
    </div>

    <div class="selectpart">
        <select><option>2</option></select>
        <select><option>0</option></select>
        <select><option>1</option></select>
    </div>

    <textarea class="boxitem" placeholder="Message"></textarea>

    <button class="sendjob">Send</button>
</div>

</body>
</html>
