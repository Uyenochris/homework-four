<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>travel-fly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="nav hatty">
  <div class="nav-content path">
    <div class="logo glassss">
      <img src="images/logo-white.png" alt="Travel Fly Logo">
    </div>

    <div class="links hint">
      <a href="#">home</a>
      <a href="#">about</a>
      <a href="#">tours</a>
      <a href="#">special offers</a>
      <a href="#">blog</a>
      <a href="#">contact</a>
    </div>
  </div>
  <div class="nav-line"></div>
</div>

<div class="hero dasa">
  <div class="hero-text cchari">
    <h1>TRAVEL-FLY</h1>
    <p>
       ipsum dolor sit amet, consectetur adipisicing elit.
      Fugiat aliquid minus nemo sed est.
    </p>
    <button>READ MORE</button>
  </div>
</div>

<div class="cards waste">

  <div class="card glassss israel">
    <div class="overlay spicespice">
      <h2>ISRAEL</h2>
      <p>FROM $1000</p>
      <button>LEARN MORE</button>
    </div>
  </div>

  <div class="card glassss usa">
    <div class="overlay spicespice">
      <h2>U.S.A</h2>
      <p>FROM $1500</p>
      <button>LEARN MORE</button>
    </div>
  </div>

  <div class="card glassss aus">
    <div class="overlay spicespice">
      <h2>AUSTRALIA</h2>
      <p>FROM $1800</p>
      <button>LEARN MORE</button>
    </div>
  </div>

</div>

<div class="form cchari">

  <h2>BOOKING FORM</h2>

  <div class="row path">
    <input type="text" placeholder="name...">
    <input type="email" placeholder="email...">
  </div>

  <div class="row path">
    <input type="text" placeholder="country...">
    <input type="text" placeholder="hotel...">
  </div>

  <div class="row date hint">
    <label>Check-in</label>
    <input type="date">
  </div>

  <div class="row date hint">
    <label>Check-out</label>
    <input type="date">
  </div>

  <div class="row small hatty">
    <div class="field glassss">
      <label>Adult</label>
      <select><option>2</option></select>
    </div>

    <div class="field glassss">
      <label>Children</label>
      <select><option>0</option></select>
    </div>

    <div class="field glassss">
      <label>Rooms</label>
      <select><option>1</option></select>
    </div>
  </div>

  <textarea placeholder="message..." class="spicespice"></textarea>

  <button class="submit hatty">SUBMIT</button>

</div>

<div class="footer hatty">
  <div class="logo glassss">
    <img src="images/logo-white.png" alt="Travel Fly Logo">
  </div>
  <p class="hint">Copyright 2019 travel-fly. All rights reserved</p>

  <div class="socials path">
    <span>f</span>
    <span>i</span>
    <span>t</span>
  </div>
</div>

</body>
</html>
